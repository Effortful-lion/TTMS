paths:
  /login:
    post:
      consumes:
      - application/json
      description: 登录接口
      parameters:
      - description: 请求参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/dto.UserLoginReq'
      responses:
        "200":
          description: 登录响应信息
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 登录接口
      tags:
      - 全局接口
  /signup:
    post:
      consumes:
      - application/json
      description: 注册接口
      parameters:
      - description: 请求参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/dto.UserSignUpReq'
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 注册接口
      tags:
      - 全局接口
  /userinfo:
    post:
      consumes:
      - application/json
      description: 获取用户信息接口
      responses:
        "200":
          description: 用户信息
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 获取用户信息接口
      tags:
      - 全局接口
swagger: "2.0"
