definitions:
  dto.UserLoginReq:
    properties:
      auth:
        description: 权限，选填
        type: string
      password:
        description: 密码，必填
        type: string
      username:
        description: 用户名，必填
        type: string
    required:
    - password
    - username
    type: object
  dto.UserSignUpReq:
    properties:
      auth:
        enum:
        - admin
        - user
        - staff
        - manager
        - ticketor
        - finance
        - account
        type: string
      password:
        description: 密码，必填
        type: string
      re_password:
        description: 确认密码，必填且必须与Password相同
        type: string
      username:
        description: 用户名，必填
        type: string
    required:
    - auth
    - password
    - re_password
    - username
    type: object
  resp.ResCode:
    enum:
    - 1000
    - 1001
    - 1002
    - 1003
    - 2000
    - 2001
    - 2002
    type: integer
    x-enum-comments:
      CodeError: 服务器内部错误
      CodeInvalidParams: 参数错误
      CodeInvalidPassword: 密码错误
      CodeNeedLogin: 需要登录
      CodeSuccess: 成功
      CodeUserExist: 用户已存在
      CodeUserNotExist: 用户不存在
    x-enum-varnames:
    - CodeSuccess
    - CodeInvalidParams
    - CodeError
    - CodeNeedLogin
    - CodeUserExist
    - CodeUserNotExist
    - CodeInvalidPassword
  resp.ResponseData:
    properties:
      data:
        description: "自定义的数据  ,omitempty可忽略空值不展示  Data any \t`json:\"data,omitempty\"`"
      msg:
        description: 自定义的msg
      status:
        allOf:
        - $ref: '#/definitions/resp.ResCode'
        description: 自定义的status
    type: object
host: 39.105.136.3:8888
info:
  contact:
    email: server-lion@qq.com
