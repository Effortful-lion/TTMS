definitions:
  dto.PlayInsertReq:
    properties:
      play_description:
        type: string
      play_end_time:
        type: string
      play_name:
        type: string
      play_price:
        type: number
      play_start_time:
        type: string
    required:
    - play_description
    - play_end_time
    - play_name
    - play_price
    - play_start_time
    type: object
  dto.PlayStatu:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-varnames:
    - PlayStatusBefore
    - PlayStatusDuring
    - PlayStatusAfter
  dto.PlayUpdateReq:
    properties:
      play_description:
        type: string
      play_end_time:
        type: string
      play_id:
        type: integer
      play_name:
        type: string
      play_price:
        type: number
      play_start_time:
        type: string
      play_statu:
        $ref: '#/definitions/dto.PlayStatu'
    required:
    - play_description
    - play_end_time
    - play_id
    - play_name
    - play_price
    - play_start_time
    - play_statu
    type: object
  dto.UserLoginReq:
    properties:
      auth:
        description: 权限，选填
        type: string
      password:
        description: 密码，必填
        type: string
      username:
        description: 用户名，必填
        type: string
    required:
    - password
    - username
    type: object
  dto.UserSignUpReq:
    properties:
      auth:
        enum:
        - admin
        - user
        - staff
        - manager
        - ticketor
        - finance
        - account
        type: string
      password:
        description: 密码，必填
        type: string
      re_password:
        description: 确认密码，必填且必须与Password相同
        type: string
      username:
        description: 用户名，必填
        type: string
    required:
    - auth
    - password
    - re_password
    - username
    type: object
  resp.ResCode:
    enum:
    - 1000
    - 1001
    - 1002
    - 1003
    - 1004
    - 2000
    - 2001
    - 2002
    type: integer
    x-enum-comments:
      CodeError: 服务器内部错误
      CodeInvalidParams: 参数错误
      CodeInvalidPassword: 密码错误
      CodeNeedLogin: 需要登录
      CodeNoAuth: 没有权限
      CodeSuccess: 成功
      CodeUserExist: 用户已存在
      CodeUserNotExist: 用户不存在
    x-enum-varnames:
    - CodeSuccess
    - CodeInvalidParams
    - CodeError
    - CodeNeedLogin
    - CodeNoAuth
    - CodeUserExist
    - CodeUserNotExist
    - CodeInvalidPassword
  resp.ResponseData:
    properties:
      data:
        description: "自定义的数据  ,omitempty可忽略空值不展示  Data any \t`json:\"data,omitempty\"`"
      msg:
        description: 自定义的msg
      status:
        allOf:
        - $ref: '#/definitions/resp.ResCode'
        description: 自定义的status
    type: object
host: 39.105.136.3:8888
info:
  contact:
    email: server-lion@qq.com
    name: Server-lion
    url: https://github.com/Effortful-lion
  description: 这是一个简单的后端系统 API 文档，包含用户管理、视频管理等功能。
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://example.com/terms/
  title: 后端系统 API在线测试文档
  version: "1.0"
paths:
  /login:
    post:
      consumes:
      - application/json
      description: 登录接口
      parameters:
      - description: 请求参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/dto.UserLoginReq'
      responses:
        "200":
          description: 登录响应信息
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 登录接口
      tags:
      - 全局接口
  /play:
    get:
      consumes:
      - application/json
      description: 获得所有剧目
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 获得所有剧目
      tags:
      - 剧目管理
    post:
      consumes:
      - application/json
      description: 添加剧目
      parameters:
      - description: 剧目信息
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/dto.PlayInsertReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 添加剧目
      tags:
      - 剧目管理
    put:
      consumes:
      - application/json
      description: 更新剧目
      parameters:
      - description: 剧目更新信息
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/dto.PlayUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 更新剧目
      tags:
      - 剧目管理
  /play/{play_id}:
    delete:
      consumes:
      - application/json
      description: 删除剧目
      parameters:
      - description: 剧目id
        in: body
        name: play_id
        required: true
        schema:
          type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 删除剧目
      tags:
      - 剧目管理
    get:
      consumes:
      - application/json
      description: 获得特定剧目
      parameters:
      - description: 剧目id
        in: body
        name: play_id
        required: true
        schema:
          type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 获得特定剧目
      tags:
      - 剧目管理
  /signup:
    post:
      consumes:
      - application/json
      description: 注册接口
      parameters:
      - description: 请求参数
        in: body
        name: object
        required: true
        schema:
          $ref: '#/definitions/dto.UserSignUpReq'
      responses:
        "200":
          description: 注册成功
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 注册接口
      tags:
      - 全局接口
  /userinfo:
    post:
      consumes:
      - application/json
      description: 获取用户信息接口
      responses:
        "200":
          description: 用户信息
          schema:
            $ref: '#/definitions/resp.ResponseData'
      summary: 获取用户信息接口
      tags:
      - 全局接口
swagger: "2.0"
